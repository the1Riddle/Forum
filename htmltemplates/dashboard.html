<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Articles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-sky-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-1/5 bg-white shadow-lg flex flex-col p-5 border-r border-sky-200">

    <h2 class="text-2xl font-bold text-sky-500 mb-8 text-center">
      🌐 Dashboard
    </h2>

    <nav class="flex flex-col space-y-4">
      <a href="#" class="p-3 rounded-lg bg-sky-100 text-gray-700 font-medium">
        📝 Articles
      </a>
    <div id="articles" class="h-256 overflow-y-auto space-y-2">
     {{.ArtDtl.Author}}
    </div>
    </nav>

  </aside>

  <!-- Main Content -->
  <main class="w-4/5 p-8">

    <!-- Header -->
    <h1 class="text-3xl font-bold text-gray-800 mb-6">
      📝 Articles & Comments
    </h1>

    <!-- Create Article Form -->
    <div class="bg-white p-6 rounded-xl shadow mb-8">

      <h2 class="text-xl font-semibold mb-4">Create Article</h2>

      <form action="/newarticle" method="POST" class="space-y-3">

        <input 
          type="text" 
          name="title"
          placeholder="Article Title"
          class="w-full p-3 border rounded-lg"
          required
        />

        <textarea 
          name="article"
          placeholder="Write your article..."
          class="w-full p-3 border rounded-lg h-32"
          required
        ></textarea>

        <button 
          type="submit"
          class="bg-sky-500 text-white px-4 py-2 rounded-lg"
        >
          Publish
        </button>

      </form>

    </div>

    <!-- Articles List -->

    <div class="space-y-6">

      <!-- Article Card -->
      <div class="bg-white p-6 rounded-xl shadow">

        <h2 class="text-2xl font-bold text-sky-600">
          Sample Article Title
        </h2>

        <p class="text-sm text-gray-500 mb-3">
          By John Doe • Just now
        </p>

        <p class="text-gray-700 mb-4">
          This is a sample article content. Your real content will appear here.
        </p>

        <!-- Comments -->
        <div class="border-t pt-4">

          <h3 class="font-semibold mb-3">💬 Comments</h3>

          <!-- Comment -->
          <div class="mb-2">
            <p class="text-sm text-gray-600"><strong>Alice</strong></p>
            <p class="text-gray-700 text-sm">This is a comment example.</p>
          </div>

          <div class="mb-2">
            <p class="text-sm text-gray-600"><strong>Bob</strong></p>
            <p class="text-gray-700 text-sm">Another comment here.</p>
          </div>

          <!-- Add Comment -->
          <div class="mt-4">

            <input 
              type="text" 
              placeholder="Write a comment..."
              class="w-full p-2 border rounded-lg mb-2"
            />

            <button class="bg-sky-400 text-white px-3 py-1 rounded-lg">
              Comment
            </button>

          </div>

        </div>
      </div>

    </div>

  </main>

</body>
</html>
