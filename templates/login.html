{{define "login.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Forum</title>
  <script src="./static/tailwind.js"></script>
  <link rel="stylesheet" href="./static/font-awesome.css">
</head>
<body class="bg-sky-100 flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md border-t-4 border-sky-400">
    <h1 class="text-3xl font-bold text-center text-sky-500 mb-2">👋 Welcome Back</h1>
    <p class="text-center text-gray-500 mb-6">Login to continue 🚀</p>

    {{if .Message}}
    <div class="bg-green-100 text-green-700 px-4 py-2 rounded-lg mb-4">{{.Message}}</div>
    {{end}}
    {{if .Error}}
    <div class="bg-red-100 text-red-600 px-4 py-2 rounded-lg mb-4">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/login" class="space-y-4">
      <div>
        <label class="block text-gray-600 mb-1">📧 Email</label>
        <input type="email" name="email" placeholder="Enter your email" required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400"/>
      </div>
      <div>
        <label class="block text-gray-600 mb-1">🔒 Password</label>
        <input type="password" name="password" placeholder="Enter your password" required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400"/>
      </div>
      <button type="submit"
        class="w-full bg-sky-400 hover:bg-sky-500 text-white font-semibold py-2 rounded-lg transition">
        🚀 Login
      </button>
    </form>

    <div class="my-4 flex items-center">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="px-3 text-gray-400 text-sm">or</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <a href="/register"
      class="block w-full text-center bg-white border border-sky-400 text-sky-500 font-semibold py-2 rounded-lg hover:bg-sky-50 transition">
      🆕 Create New Account
    </a>
  </div>
</body>
</html>
{{end}}
