<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments Section</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .comment-enter { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reaction-btn.active-like { color: #3b82f6; }
        .reaction-btn.active-dislike { color: #ef4444; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="commentsContainer" class="max-w-4xl mx-auto p-4">
        <!-- Header -->
        <div class="bg-white rounded-t-xl p-4 border-b border-gray-200">
            <h3 class="text-lg font-semibold text-gray-800">
                <i class="fas fa-comments mr-2"></i>
                Comments <span id="commentCount" class="text-blue-500">(0)</span>
            </h3>
        </div>
        
        <!-- Add Comment Form (shown when logged in) -->
        <div id="addCommentForm" class="bg-white p-4 hidden">
            <div class="flex gap-3">
                <div class="flex-shrink-0">
                    <div id="userAvatar" class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">U</div>
                </div>
                <div class="flex-1">
                    <textarea id="commentInput" rows="3" placeholder="Write a comment... (max 2000 characters)" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 resize-none" maxlength="2000"></textarea>
                    <div class="flex justify-between items-center mt-2">
                        <div class="text-xs text-gray-500"><span id="charCount">0</span>/2000 characters</div>
                        <button id="submitCommentBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition flex items-center gap-2">
                            <i class="fas fa-paper-plane"></i> Post Comment
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Login Prompt (shown when not logged in) -->
        <div id="loginPrompt" class="bg-white p-6 text-center hidden">
            <i class="fas fa-lock text-gray-400 text-4xl mb-3"></i>
            <p class="text-gray-600 mb-3">Join the conversation!</p>
            <button id="loginRedirectBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-lg transition">Login to Comment</button>
        </div>
        
        <!-- Comments List -->
        <div id="commentsList" class="bg-white rounded-b-xl divide-y divide-gray-200">
            <div id="loadingComments" class="p-8 text-center text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p>Loading comments...</p>
            </div>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4">Edit Comment</h3>
            <textarea id="editCommentInput" rows="4" class="w-full p-3 border rounded-lg"></textarea>
            <div class="flex justify-end gap-3 mt-4">
                <button id="cancelEditBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100">Cancel</button>
                <button id="saveEditBtn" class="px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600">Save</button>
            </div>
        </div>
    </div>
    
    <!-- Delete Modal -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-semibold mb-4">Delete Comment</h3>
            <p class="text-gray-600 mb-6">Are you sure you want to delete this comment? This cannot be undone.</p>
            <div class="flex justify-end gap-3">
                <button id="cancelDeleteBtn" class="px-4 py-2 border rounded-lg hover:bg-gray-100">Cancel</button>
                <button id="confirmDeleteBtn" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">Delete</button>
            </div>
        </div>
    </div>
    
    <!-- Notification Container -->
    <div id="notificationContainer" class="fixed bottom-4 right-4 z-50 space-y-2"></div>
    
    <script>
        const API_BASE_URL = '';
        let currentUser = null;
        let currentPostId = '{{.PostID}}';
        let editingCommentId = null;
        let deletingCommentId = null;
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMins = Math.floor((now - date) / 60000);
            if (diffMins < 1) return 'Just now';
            if (diffMins < 60) return diffMins + ' minutes ago';
            if (diffMins < 1440) return Math.floor(diffMins / 60) + ' hours ago';
            return Math.floor(diffMins / 1440) + ' days ago';
        }
        
        function showNotification(message, type) {
            const container = document.getElementById('notificationContainer');
            const colors = { success: 'bg-green-500', error: 'bg-red-500', info: 'bg-blue-500', warning: 'bg-yellow-500' };
            const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
            const notification = document.createElement('div');
            notification.className = colors[type] + ' text-white px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 translate-x-full';
            notification.innerHTML = '<div class="flex items-center gap-3"><span>' + icons[type] + '</span><span>' + message + '</span><button class="ml-4 hover:opacity-75">&times;</button></div>';
            container.appendChild(notification);
            setTimeout(() => notification.classList.remove('translate-x-full'), 10);
            setTimeout(() => { notification.classList.add('translate-x-full'); setTimeout(() => notification.remove(), 300); }, 4000);
            notification.querySelector('button').onclick = () => { notification.classList.add('translate-x-full'); setTimeout(() => notification.remove(), 300); };
        }
        
        async function checkAuthStatus() {
            try {
                const response = await fetch(API_BASE_URL + '/api/user/current', { credentials: 'include' });
                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('addCommentForm').classList.remove('hidden');
                    document.getElementById('loginPrompt').classList.add('hidden');
                    const avatar = document.getElementById('userAvatar');
                    if (currentUser.username) avatar.textContent = currentUser.username.charAt(0).toUpperCase();
                } else {
                    currentUser = null;
                    document.getElementById('addCommentForm').classList.add('hidden');
                    document.getElementById('loginPrompt').classList.remove('hidden');
                }
            } catch (error) {
                currentUser = null;
                document.getElementById('addCommentForm').classList.add('hidden');
                document.getElementById('loginPrompt').classList.remove('hidden');
            }
        }
        
        async function loadComments() {
            const commentsList = document.getElementById('commentsList');
            try {
                const response = await fetch(API_BASE_URL + '/api/comments/get?postId=' + currentPostId, { credentials: 'include' });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('commentCount').textContent = '(' + data.comments.length + ')';
                    if (data.comments.length === 0) {
                        commentsList.innerHTML = '<div class="p-8 text-center text-gray-500"><i class="fas fa-comment-dots text-4xl mb-3 opacity-50"></i><p>No comments yet. Be the first!</p></div>';
                        return;
                    }
                    commentsList.innerHTML = data.comments.map(comment => {
                        const userInitial = comment.username.charAt(0).toUpperCase();
                        const likeClass = comment.user_reaction === 'like' ? 'active-like' : 'text-gray-500';
                        const dislikeClass = comment.user_reaction === 'dislike' ? 'active-dislike' : 'text-gray-500';
                        const editButtons = (currentUser && comment.user_id === currentUser.id) ? 
                            '<button class="edit-comment-btn text-sm text-gray-500 hover:text-blue-500 transition ml-3" data-comment-id="' + comment.id + '"><i class="fas fa-edit"></i> Edit</button>' +
                            '<button class="delete-comment-btn text-sm text-gray-500 hover:text-red-500 transition ml-3" data-comment-id="' + comment.id + '"><i class="fas fa-trash"></i> Delete</button>' : '';
                        return '<div class="comment-item p-4 hover:bg-gray-50 transition comment-enter" data-comment-id="' + comment.id + '">' +
                            '<div class="flex gap-3">' +
                            '<div class="flex-shrink-0"><div class="w-10 h-10 bg-gradient-to-r from-blue-500 to-blue-600 rounded-full flex items-center justify-center text-white font-bold">' + userInitial + '</div></div>' +
                            '<div class="flex-1">' +
                            '<div class="flex items-center gap-2 mb-1 flex-wrap">' +
                            '<span class="font-semibold text-gray-800">' + escapeHtml(comment.username) + '</span>' +
                            '<span class="text-xs text-gray-500">' + formatDate(comment.created_at) + '</span>' +
                            '</div>' +
                            '<p class="comment-content text-gray-700 mb-3">' + escapeHtml(comment.content) + '</p>' +
                            '<div class="flex items-center">' +
                            '<button class="comment-like-btn reaction-btn flex items-center gap-1 text-sm ' + likeClass + ' hover:text-blue-500 transition" data-comment-id="' + comment.id + '">' +
                            '<i class="fas fa-thumbs-up"></i> <span class="like-count">' + comment.likes + '</span></button>' +
                            '<button class="comment-dislike-btn reaction-btn flex items-center gap-1 text-sm ' + dislikeClass + ' hover:text-red-500 transition ml-4" data-comment-id="' + comment.id + '">' +
                            '<i class="fas fa-thumbs-down"></i> <span class="dislike-count">' + comment.dislikes + '</span></button>' +
                            editButtons +
                            '</div></div></div></div>';
                    }).join('');
                }
            } catch (error) {
                commentsList.innerHTML = '<div class="p-8 text-center text-red-500">Failed to load comments</div>';
            }
        }
        
        async function submitComment() {
            const content = document.getElementById('commentInput').value.trim();
            if (!content) { showNotification('Please enter a comment', 'warning'); return; }
            if (content.length > 2000) { showNotification('Comment too long', 'warning'); return; }
            const response = await fetch(API_BASE_URL + '/api/comments/create', {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                body: JSON.stringify({ postId: currentPostId, content: content })
            });
            const data = await response.json();
            if (data.success) {
                showNotification('Comment posted!', 'success');
                document.getElementById('commentInput').value = '';
                document.getElementById('charCount').textContent = '0';
                await loadComments();
            } else { showNotification(data.error || 'Failed to post', 'error'); }
        }
        
        async function likeComment(commentId) {
            if (!currentUser) { showNotification('Please login to like', 'warning'); return; }
            const response = await fetch(API_BASE_URL + '/api/comments/like?commentId=' + commentId, { method: 'POST', credentials: 'include' });
            const data = await response.json();
            if (data.success) await loadComments();
        }
        
        async function dislikeComment(commentId) {
            if (!currentUser) { showNotification('Please login to dislike', 'warning'); return; }
            const response = await fetch(API_BASE_URL + '/api/comments/dislike?commentId=' + commentId, { method: 'POST', credentials: 'include' });
            const data = await response.json();
            if (data.success) await loadComments();
        }
        
        function editComment(commentId) {
            const commentDiv = document.querySelector('.comment-item[data-comment-id="' + commentId + '"]');
            const content = commentDiv.querySelector('.comment-content').textContent;
            editingCommentId = commentId;
            document.getElementById('editCommentInput').value = content;
            document.getElementById('editModal').classList.remove('hidden');
        }
        
        async function saveEdit() {
            const newContent = document.getElementById('editCommentInput').value.trim();
            if (!newContent) { showNotification('Comment cannot be empty', 'warning'); return; }
            const response = await fetch(API_BASE_URL + '/api/comments/update', {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, credentials: 'include',
                body: JSON.stringify({ commentId: editingCommentId, content: newContent })
            });
            const data = await response.json();
            if (data.success) {
                showNotification('Comment updated!', 'success');
                document.getElementById('editModal').classList.add('hidden');
                await loadComments();
            } else { showNotification(data.error || 'Failed to update', 'error'); }
        }
        
        function deleteComment(commentId) {
            deletingCommentId = commentId;
            document.getElementById('deleteModal').classList.remove('hidden');
        }
        
        async function confirmDelete() {
            const response = await fetch(API_BASE_URL + '/api/comments/delete?commentId=' + deletingCommentId, { method: 'DELETE', credentials: 'include' });
            const data = await response.json();
            if (data.success) {
                showNotification('Comment deleted!', 'success');
                document.getElementById('deleteModal').classList.add('hidden');
                await loadComments();
            } else { showNotification(data.error || 'Failed to delete', 'error'); }
        }
        
        // Event listeners
        document.getElementById('submitCommentBtn').onclick = submitComment;
        document.getElementById('loginRedirectBtn').onclick = () => window.location.href = '/login';
        document.getElementById('cancelEditBtn').onclick = () => document.getElementById('editModal').classList.add('hidden');
        document.getElementById('saveEditBtn').onclick = saveEdit;
        document.getElementById('cancelDeleteBtn').onclick = () => document.getElementById('deleteModal').classList.add('hidden');
        document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
        
        document.getElementById('commentInput').addEventListener('input', function() {
            document.getElementById('charCount').textContent = this.value.length;
        });
        
        document.getElementById('commentsList').addEventListener('click', (e) => {
            const likeBtn = e.target.closest('.comment-like-btn');
            const dislikeBtn = e.target.closest('.comment-dislike-btn');
            const editBtn = e.target.closest('.edit-comment-btn');
            const deleteBtn = e.target.closest('.delete-comment-btn');
            if (likeBtn) likeComment(likeBtn.dataset.commentId);
            if (dislikeBtn) dislikeComment(dislikeBtn.dataset.commentId);
            if (editBtn) editComment(editBtn.dataset.commentId);
            if (deleteBtn) deleteComment(deleteBtn.dataset.commentId);
        });
        
        // Initialize
        checkAuthStatus();
        loadComments();
    </script>
</body>
</html>
