<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ForumFlow - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .register-card {
      animation: slideInRight 0.5s ease-out;
    }
    
    .info-card {
      animation: slideInLeft 0.5s ease-out;
    }
    
    .password-strength {
      transition: width 0.3s ease;
    }
  </style>
</head>

<body class="bg-sky-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-md border-t-4 border-sky-400">
        <h1 class="text-3xl font-bold text-center text-sky-500 mb-6">Create Account</h1>
        <p class="text-center text-gray-500 mb-6">Join the conversation! </p>

        <form class="space-y-4" method="POST" action="/register">
            <div>
                <label class="block text-gray-600 mb-1">Username</label>
                <input name="username" type="text" placeholder="Choose a username"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400" required />
            </div>
            <div>
                <label class="block text-gray-600 mb-1">Email Address</label>
                <input name="email" type="email" placeholder="your@email.com"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400" required />
            </div>
            <div>
                <label class="block text-gray-600 mb-1">Password</label>
                <input name="password" type="password" placeholder="Create a password"
                    class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400" required />
            </div>
            <button type="submit" class="w-full bg-sky-400 hover:bg-sky-500 text-white font-semibold py-2 rounded-lg transition duration-200">
                Register
            </button>
        </form>

        <!-- Divider -->
          <div class="my-6">
            <div class="relative">
              <div class="absolute inset-0 flex items-center">
                <div class="w-full border-t border-gray-300 dark:border-gray-600"></div>
              </div>
              <div class="relative flex justify-center text-sm">
                <span class="px-3 bg-white/90 dark:bg-gray-800/90 text-gray-500">Already have an account?</span>
              </div>
            </div>
          </div>

        <!-- Login Link -->
          <a href="/login"
            class="block w-full text-center bg-white border-2 border-sky-500 text-sky-600 font-semibold py-3 rounded-xl hover:bg-sky-50 dark:hover:bg-gray-700 transition-all">
            <i class="fas fa-sign-in-alt mr-2"></i>Sign In Instead
          </a>
          
          <!-- Back to Home -->
          <div class="mt-4 text-center">
            <a href="/" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-300 text-sm">
              <i class="fas fa-arrow-left mr-1"></i>← Back to Login
            </a>
          </div>
    </div>
</body>
</html>
