{{define "create_post.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50">
    <div class="max-w-2xl mx-auto p-6">
        <div class="bg-white rounded-xl shadow p-6">
            <h1 class="text-2xl font-bold mb-6">Create New Post</h1>
            <form method="POST" action="/api/posts/create">
                <input type="text" name="title" placeholder="Post Title" class="w-full p-3 border rounded-lg mb-4" required>
                <textarea name="content" rows="6" placeholder="Write your post..." class="w-full p-3 border rounded-lg mb-4" required></textarea>
                <div class="mb-4">
                    <p class="mb-2 font-semibold">Categories:</p>
                    {{range .Categories}}
                    <label class="mr-4"><input type="checkbox" name="categories" value="{{.Name}}"> {{.Name}}</label>
                    {{end}}
                </div>
                <button type="submit" class="bg-sky-500 text-white px-6 py-2 rounded-lg hover:bg-sky-600">Publish Post</button>
                <a href="/" class="ml-4 text-gray-500 hover:underline">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
{{end}}
