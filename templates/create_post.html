{{define "create_post.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>New Post - Forum</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-sky-50 min-h-screen">

  <nav class="bg-white shadow px-6 py-3 flex justify-between items-center">
    <a href="/" class="text-2xl font-bold text-sky-600">Forum</a>
    <div class="flex gap-3 items-center">
      <span class="text-gray-600">👤 {{.User.Username}}</span>
      <a href="/logout" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg hover:bg-red-200">Logout</a>
    </div>
  </nav>

  <div class="max-w-2xl mx-auto p-6">
    <div class="bg-white rounded-xl shadow p-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-6">Create New Post</h1>

      {{if .Error}}
      <div class="bg-red-100 text-red-600 px-4 py-2 rounded-lg mb-4">{{.Error}}</div>
      {{end}}

      <form method="POST" action="/post/new" class="space-y-4">
        <div>
          <label class="block text-gray-600 mb-1">Title</label>
          <input type="text" name="title" placeholder="Post title" required
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-sky-400"/>
        </div>
        <div>
          <label class="block text-gray-600 mb-1">Content</label>
          <textarea name="content" placeholder="Write your post..." required
            class="w-full px-4 py-2 border rounded-lg h-40 focus:outline-none focus:ring-2 focus:ring-sky-400"></textarea>
        </div>
        <div>
          <label class="block text-gray-600 mb-2">Categories (select one or more)</label>
          <div class="flex flex-wrap gap-2">
            {{range .Categories}}
            <label class="flex items-center gap-1 bg-sky-50 px-3 py-1 rounded-lg cursor-pointer hover:bg-sky-100">
              <input type="checkbox" name="categories" value="{{.Id}}"/>
              {{.Name}}
            </label>
            {{end}}
          </div>
        </div>
        <div class="flex gap-3">
          <button type="submit"
            class="bg-sky-500 text-white px-6 py-2 rounded-lg hover:bg-sky-600">
            Publish
          </button>
          <a href="/" class="bg-gray-100 text-gray-600 px-6 py-2 rounded-lg hover:bg-gray-200">
            Cancel
          </a>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
{{end}}
